services:
  digest:
    build: .
    image: tg-digest:local
    container_name: tg-digest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
